name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build static binaries
        run: CGO_ENABLED=0 go build ./cmd/odin ./cmd/odin-watchdog
      - name: Cross-compile deployment binaries
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/odin ./cmd/odin
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/odin-watchdog ./cmd/odin-watchdog
